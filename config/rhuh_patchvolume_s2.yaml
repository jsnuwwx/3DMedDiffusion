model:
  seed: 1234
  batch_size: 2
  num_workers: 1
  gpus: 1
  default_root_dir: E:\deep learning code\3D_MedDiffusion_Code\results_rhuh_vae
  resume_from_checkpoint: E:\deep learning code\3D_MedDiffusion_Code\PatchVolume4x_s2.ckpt
  max_steps: 1000000
